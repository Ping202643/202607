    --blue-soft:#d3ecff;
    --hp-green:#7ed957;
    --hp-yellow:#ffd23f;
    --hp-red:#ff5c5c;
    --special:#ffd23f;
    --frame-bg:#0c1626;
    --frame-bg2:#182a3d;
    --font-pixel:"Press Start 2P",monospace;
    --font-cjk:"SimHei","黑体","STHeiti","Heiti SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:linear-gradient(180deg,var(--frame-bg),var(--frame-bg2));
    min-height:100vh;
    font-family:var(--font-cjk);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding:18px 12px 40px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }
  .stage{
    max-width:860px;
    margin:0 auto;
  }
  .stage-title{
    text-align:center;
    color:#fff;
    font-family:var(--font-pixel);
    font-size:11px;
    letter-spacing:.06em;
    margin:0 0 14px;
    line-height:1.9;
    opacity:.85;
  }
  .pixel-panel{
    background:var(--panel-bg);
    border:4px solid var(--panel-border);
    clip-path:polygon(0 10px,10px 10px,10px 0,calc(100% - 10px) 0,calc(100% - 10px) 10px,100% 10px,100% calc(100% - 10px),calc(100% - 10px) calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,10px calc(100% - 10px),0 calc(100% - 10px));
  }
  .pixel-btn{
    font-family:var(--font-pixel);
    font-size:12px;
    color:#fff;
    background:var(--red);
    border:3px solid var(--ink);
    padding:14px 22px;
    cursor:pointer;
    box-shadow:4px 4px 0 var(--ink);
    clip-path:polygon(0 6px,6px 6px,6px 0,calc(100% - 6px) 0,calc(100% - 6px) 6px,100% 6px,100% calc(100% - 6px),calc(100% - 6px) calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,6px calc(100% - 6px),0 calc(100% - 6px));
    transition:transform .08s;
  }
  .pixel-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink);}
  .pixel-btn:focus-visible{outline:3px solid #fff;outline-offset:2px;}
  .pixel-btn.blue{background:var(--blue);}
  .pixel-btn.ghost{background:var(--panel-bg);color:var(--ink);}
  .pixel-btn[disabled]{opacity:.5;cursor:default;}

  /* ---- start screen ---- */
  .start-panel{
    padding:36px 24px;
    text-align:center;
  }
  .start-panel h1{
    font-family:var(--font-pixel);
    font-size:22px;
    line-height:1.7;
    margin:0 0 18px;
    text-shadow:3px 3px 0 var(--red-soft);
  }
  .start-rules{
    font-size:14px;
    line-height:2;
    color:#3a3f2e;
    max-width:480px;
    margin:0 auto 26px;
    text-align:left;
    background:rgba(0,0,0,.05);
    border:2px dashed var(--ink);
    padding:14px 18px;
  }
  .start-rules b{color:var(--red-dark);}

  /* ---- arena ---- */
  .arena-frame{
    position:relative;
    overflow:hidden;
    border:4px solid var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:400px;
    padding:92px 0 148px;
  }
  .arena-frame.shake{animation:screenShake .35s ease;}
  .sky{
    position:absolute; inset:0;
    background:linear-gradient(180deg,var(--sky-top),var(--sky-bottom) 75%);
  }
  .hill{position:absolute; left:-5%; width:110%; bottom:0;}
  .hill-back{
    height:34%;
    background:var(--hill-back);
    clip-path:polygon(0 100%,0 55%,10% 35%,22% 50%,34% 28%,48% 46%,60% 22%,74% 42%,86% 26%,100% 44%,100% 100%);
    opacity:.55;
  }
  .hill-front{
    height:22%;
    background:var(--hill-front);
    clip-path:polygon(0 100%,0 60%,14% 30%,28% 55%,44% 24%,58% 50%,74% 20%,88% 48%,100% 30%,100% 100%);
  }
  .ground{
    position:absolute; left:0; right:0; bottom:0; height:12%;
    background:var(--hill-front2);
    border-top:3px solid rgba(0,0,0,.18);
  }

  .hud-top{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:10px 12px;
    z-index:5;
  }
  .fighter-card{
    width:44%;
    max-width:280px;
    background:rgba(255,255,255,.88);
    border:3px solid var(--ink);
    padding:6px 8px;
    font-family:var(--font-pixel);
  }
  .fighter-card.right{text-align:right;}
  .fighter-name{
    font-size:9px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:4px;
  }
  .fighter-card.right .fighter-name{flex-direction:row-reverse;}
  .fighter-name .side-tag{color:var(--red-dark);}
  .fighter-card.right .side-tag{color:var(--blue-dark);}
  .hp-track{
    height:10px;
    background:#20240f;
    border:2px solid var(--ink);
    overflow:hidden;
  }
  .hp-fill{
    height:100%;
    transition:width .5s cubic-bezier(.2,.8,.3,1);
  }
  .hp-num{font-size:8px; margin-top:3px; color:var(--ink); opacity:.75;}
  .special-track{
    height:6px;
    background:#2a2a2a;
    border:2px solid var(--ink);
    margin-top:5px;
    overflow:hidden;
  }
  .special-fill{
    height:100%;
    background:var(--special);
    transition:width .4s ease;
  }

  .vs-badge{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    width:46px; height:46px; border-radius:50%;
    background:#fff; border:3px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-pixel); font-size:9px; color:var(--ink);
    z-index:6; box-shadow:2px 2px 0 rgba(0,0,0,.3);
    flex-direction:column; line-height:1.3;
  }

  .fighter-slot{
    position:absolute; bottom:12%;
    width:120px; height:120px;
  }
  .fighter-slot.left{left:8%;}
  .fighter-slot.right{right:8%;}
  .fighter-slot canvas{
    width:100%; height:100%;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    animation:idleBob 1.8s ease-in-out infinite;
  }
  .fighter-slot.left canvas.attack{animation:lungeRight .5s ease;}
  .fighter-slot.right canvas.attack{animation:lungeLeft .5s ease;}
  .fighter-slot canvas.hurt{animation:hurtShake .4s ease, flashWhite .4s ease;}
  .fighter-slot canvas.faint{animation:faint .7s ease forwards;}
  .fighter-shadow{
    position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
    width:70px; height:14px; border-radius:50%;
    background:rgba(0,0,0,.25); filter:blur(1px);
  }

  .projectile{
    position:absolute; top:46%; width:16px; height:16px;
    border-radius:50%;
    z-index:7;
    box-shadow:0 0 10px 4px currentColor;
  }
  .projectile.fire{background:#ff8a3d; color:#ff8a3d;}
  .projectile.ice{background:#7fe0ff; color:#7fe0ff;}
  .projectile.toRight{animation:flyRight .45s linear forwards;}
  .projectile.toLeft{animation:flyLeft .45s linear forwards;}
  @keyframes flyRight{from{left:20%;}to{left:74%;}}
  @keyframes flyLeft{from{left:74%;}to{left:20%;}}

  .popup-text{
    position:absolute; top:38%;
    font-family:var(--font-pixel);
    font-size:13px;
    color:#fff;
    -webkit-text-stroke:2px var(--ink);
    paint-order:stroke fill;
    animation:popText 1s ease forwards;
    z-index:8;
    white-space:nowrap;
  }
  .popup-text.left{left:14%;}
  .popup-text.right{right:14%;}
  .popup-text.hit{color:#fff59d;}
  .popup-text.crit{color:#ff5c5c; font-size:16px;}

  @keyframes idleBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  @keyframes lungeRight{0%{transform:translateY(0) translateX(0);}40%{transform:translateY(-4px) translateX(46px) rotate(-6deg);}100%{transform:translateY(0) translateX(0);}}
  @keyframes lungeLeft{0%{transform:translateY(0) translateX(0);}40%{transform:translateY(-4px) translateX(-46px) rotate(6deg);}100%{transform:translateY(0) translateX(0);}}
  @keyframes hurtShake{0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}}
  @keyframes flashWhite{0%,100%{filter:none;}50%{filter:brightness(2.6) saturate(0);}}
  @keyframes faint{0%{transform:translateY(0) rotate(0);opacity:1;}100%{transform:translateY(50px) rotate(95deg);opacity:0;}}
  @keyframes popText{0%{transform:translateY(0) scale(.6);opacity:0;}18%{transform:translateY(-14px) scale(1.15);opacity:1;}82%{transform:translateY(-34px) scale(1);opacity:1;}100%{transform:translateY(-46px) scale(.9);opacity:0;}}
  @keyframes screenShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-9px);}50%{transform:translateX(9px);}75%{transform:translateX(-5px);}}

  /* ---- question dialog ---- */
  .dialog-box{
    position:relative;
    z-index:8;
    width:86%;
    max-width:600px;
    padding:16px 18px 18px;
    animation:dialogIn .25s ease;
  }
  @keyframes dialogIn{
    from{opacity:0; transform:translateY(-10px) scale(.97);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .dialog-meta{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px;
    font-family:var(--font-pixel);
    font-size:9px;
    color:var(--ink);
  }
  .dialog-tag{
    padding:3px 8px;
    border:2px solid var(--ink);
    background:#fff;
  }
  .dialog-tag.type-F{background:var(--hp-green);}
  .dialog-tag.type-M{background:var(--blue-soft);}
  .dialog-tag.type-T{background:#e6e0c8;}
  .danger-meter{color:var(--red-dark);}
  .q-text{
    font-size:17px;
    font-weight:700;
    line-height:1.75;
    margin:0 0 18px;
    text-wrap:balance;
  }
  .blank-input{
    font-family:var(--font-pixel);
    font-size:12px;
    border:none;
    border-bottom:3px solid var(--ink);
    background:transparent;
    padding:3px 4px;
    min-width:60px;
    text-align:center;
    margin:0 3px;
    color:var(--red-dark);
  }
  .blank-input:focus{outline:none;background:rgba(255,255,255,.6);}
  .blank-input[data-state="correct"]{color:#2f8f5e;border-color:#2f8f5e;}
  .blank-input[data-state="wrong"]{color:var(--red-dark);border-color:var(--red-dark);}

  .opt-grid{display:flex; flex-direction:column; gap:9px; margin-bottom:6px;}
  .opt-btn{
    text-align:left;
    padding:12px 14px;
    border:3px solid var(--ink);
    background:#fff;
    font-family:var(--font-cjk);
    font-size:14.5px;
    font-weight:600;
    cursor:pointer;
    display:flex; gap:10px; align-items:baseline;
    box-shadow:3px 3px 0 rgba(0,0,0,.18);
  }
  .opt-btn .idx{font-family:var(--font-pixel); font-size:10px; color:#8a8560; flex-shrink:0;}
  .opt-btn:hover:not([disabled]){background:#fff9e6;}
  .opt-btn:focus-visible{outline:3px solid var(--blue);}
  .opt-btn[data-mark="correct"]{background:#d8f5df; border-color:#2f8f5e;}
  .opt-btn[data-mark="wrong"]{background:#ffdcd8; border-color:var(--red-dark);}
  .opt-btn[disabled]{cursor:default;}

  .tf-row{display:flex; gap:12px; margin-bottom:6px;}
  .tf-btn{
    flex:1; padding:14px; border:3px solid var(--ink); background:#fff;
    font-family:var(--font-pixel); font-size:12px; cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,.18);
  }
  .tf-btn:hover:not([disabled]){background:#fff9e6;}
  .tf-btn[data-mark="correct"]{background:#d8f5df; border-color:#2f8f5e;}
  .tf-btn[data-mark="wrong"]{background:#ffdcd8; border-color:var(--red-dark);}
  .tf-btn[disabled]{cursor:default;}

  .dialog-actions{display:flex; justify-content:flex-end; margin-top:6px;}
  .feedback-line{
    font-size:13px; margin-top:12px; padding:10px 12px;
    border:2px dashed var(--ink); display:none; line-height:1.6;
  }
  .feedback-line.show{display:block;}
  .feedback-line.ok{background:#e3f6e8;}
  .feedback-line.no{background:#fde6e4;}

  /* ---- result screen ---- */
  .result-panel{
    text-align:center;
    padding:44px 22px;
  }
  .result-title{
    font-family:var(--font-pixel);
    font-size:26px;
    line-height:1.6;
    margin:0 0 20px;
    animation:bannerDrop .6s cubic-bezier(.2,1.4,.4,1);
  }
  .result-title.win{color:var(--blue-dark); text-shadow:3px 3px 0 var(--special);}
  .result-title.lose{color:var(--red-dark); text-shadow:3px 3px 0 #ffb3ae;}
  @keyframes bannerDrop{0%{transform:translateY(-60px) scale(.8);opacity:0;}70%{transform:translateY(6px) scale(1.03);opacity:1;}100%{transform:translateY(0) scale(1);opacity:1;}}
  .result-stats{
    display:flex; justify-content:center; gap:26px; margin:22px 0 30px;
    font-family:var(--font-pixel); flex-wrap:wrap;
  }
  .result-stats div b{display:block; font-size:20px; margin-bottom:6px;}
  .result-stats div span{font-size:9px; color:#6b6b52;}
  .confetti-wrap{position:absolute; inset:0; overflow:hidden; pointer-events:none;}
  .confetti{
    position:absolute; top:-16px; width:8px; height:8px;
    animation:confettiFall 2.4s linear forwards;
  }
  @keyframes confettiFall{
    to{transform:translateY(420px) rotate(280deg); opacity:0;}
  }
  .result-frame{position:relative; overflow:hidden;}

  @media (max-width:560px){
    .fighter-card{font-size:8px;}
    .fighter-name{font-size:8px;}
    .q-text{font-size:15px;}
    .result-title{font-size:19px;}
    .start-panel h1{font-size:16px;}
    .arena-frame{padding:78px 0 112px; min-height:340px;}
    .fighter-slot{width:90px; height:90px;}
    .dialog-box{width:94%; padding:13px 14px 15px;}
  }
</style>

<div class="stage">
  <p class="stage-title">CHEMISTRY BATTLE · 8-BIT QUIZ ARENA</p>
  <div id="root"></div>
</div>

var TOTAL_ROUNDS = 72;

/* ---------------- helpers ---------------- */
function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j = Math.floor(Math.random()*(i+1));
    var t=a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}
var SUB_DIGITS="₀₁₂₃₄₅₆₇₈₉", SUP_DIGITS="⁰¹²³⁴⁵⁶⁷⁸⁹";
function normalize(s){
  s=String(s).trim().toLowerCase();
  s=s.replace(/[₀₁₂₃₄₅₆₇₈₉]/g,function(c){return String(SUB_DIGITS.indexOf(c));});
  s=s.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g,function(c){return String(SUP_DIGITS.indexOf(c));});
  s=s.replace(/[０-９]/g,function(c){return String.fromCharCode(c.charCodeAt(0)-0xFEE0);});
  s=s.replace(/\s+/g,"");
  s=s.replace(/[·•∙]/g,"·");
  s=s.replace(/（/g,"(").replace(/）/g,")");
  s=s.replace(/[、，。；！？,.;!?]/g,"");
  return s;
}
var FILLER_WORDS=/的|了|着|就是|各自|它们|那些|其中|大约|按照|以及|是|这|那/g;
function coreChars(s){
  var t=normalize(s).replace(FILLER_WORDS,"");
  var seen={}, out=[];
  for(var i=0;i<t.length;i++){ if(!seen[t[i]]){seen[t[i]]=true; out.push(t[i]);} }
  return out;
}
function fuzzyMatch(inputRaw, acceptRaw){
  var inputNorm=normalize(inputRaw), acceptNorm=normalize(acceptRaw);
  if(!inputNorm) return false;
  if(inputNorm===acceptNorm) return true;
  if(acceptNorm.length<4) return false;
  var core=coreChars(acceptRaw);
  if(core.length<3) return false;
  var hit=core.filter(function(c){return inputNorm.indexOf(c)!==-1;}).length;
  return (hit/core.length)>=0.7;
}
function escapeHtml(s){ return s; } // React text nodes escape automatically

/* ---------------- sound ---------------- */
var audioCtx = null;
function getCtx(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  return audioCtx;
}
function beep(freq, dur, type, delay, vol){
  var ctx = getCtx();
  if(!ctx) return;
  var t0 = ctx.currentTime + (delay||0);
  var osc = ctx.createOscillator();
  var gain = ctx.createGain();
  osc.type = type||"square";
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol||0.07, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
function sfxHit(){ beep(180,0.11,"square"); }
function sfxCrit(){ beep(140,0.09,"sawtooth"); beep(280,0.14,"square",0.07); }
function sfxWrong(){ beep(90,0.18,"sawtooth"); }
function sfxWin(){ [523,659,784,1047].forEach(function(f,i){ beep(f,0.16,"square",i*0.13); }); }
function sfxLose(){ [392,330,262,196].forEach(function(f,i){ beep(f,0.22,"sawtooth",i*0.16); }); }

/* ---------------- pixel creature sprite ---------------- */
function hexToRgb(hex){
  hex=hex.replace("#","");
  return {r:parseInt(hex.substring(0,2),16), g:parseInt(hex.substring(2,4),16), b:parseInt(hex.substring(4,6),16)};
}
function lerpColor(a,b,t){
  var ca=hexToRgb(a), cb=hexToRgb(b);
  var r=Math.round(ca.r+(cb.r-ca.r)*t);
  var g=Math.round(ca.g+(cb.g-ca.g)*t);
  var bl=Math.round(ca.b+(cb.b-ca.b)*t);
  return "rgb("+r+","+g+","+bl+")";
}
var PALETTES = {
  ember:{highlight:"#ffb37a", base:"#ff8a4a", shade:"#e5613a", accTop:"#ffe066", accBase:"#ff5c3d", feet:"#c94b2c", faceDir:1},
  frost:{highlight:"#bfe9ff", base:"#5fc9ff", shade:"#2f8fe0", accTop:"#eafcff", accBase:"#5fc9ff", feet:"#1c5fa0", faceDir:-1}
};
function drawCreature(canvas, kind){
  if(!canvas) return;
  var W=24,H=24;
  canvas.width=W; canvas.height=H;
  var ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,W,H);
  var pal = PALETTES[kind];
  var ink = "#14161c";
  var cx=12, cyBody=15, rx=8.6, ry=7.6;
  var isFlame = kind==="ember";

  function inBody(x,y){
    var nx=(x+0.5-cx)/rx, ny=(y+0.5-cyBody)/ry;
    return nx*nx+ny*ny<=1;
  }
  function inFoot(x,y,fx){
    var nx=(x+0.5-fx)/2.6, ny=(y+0.5-21.5)/1.8;
    return nx*nx+ny*ny<=1;
  }
  function inFlame(x,y){
    if(y<2||y>10) return false;
    var t=(y-2)/8;
    return Math.abs(x+0.5-cx) <= t*4.4;
  }
  function inCrystal(x,y){
    var nx=Math.abs(x+0.5-cx)/5, ny=Math.abs(y+0.5-6)/4.2;
    return nx+ny<=1;
  }
  function inAcc(x,y){ return isFlame ? inFlame(x,y) : inCrystal(x,y); }

  var mask=[];
  for(var y=0;y<H;y++){
    mask.push(new Array(W).fill(false));
    for(var x=0;x<W;x++){
      if(inBody(x,y)||inFoot(x,y,7)||inFoot(x,y,17)||inAcc(x,y)) mask[y][x]=true;
    }
  }

  for(y=0;y<H;y++){
    for(x=0;x<W;x++){
      if(!mask[y][x]) continue;
      var color;
      if(inAcc(x,y)){
        var t=Math.min(1,Math.max(0,(y-2)/8));
        color = lerpColor(pal.accTop, pal.accBase, t);
      } else if(inFoot(x,y,7)||inFoot(x,y,17)){
        color = pal.feet;
      } else if(y < cyBody-1){
        color = pal.highlight;
      } else if(y > cyBody+3){
        color = pal.shade;
      } else {
        color = pal.base;
      }
      ctx.fillStyle=color;
      ctx.fillRect(x,y,1,1);
    }
  }

  ctx.fillStyle=ink;
  for(y=0;y<H;y++){
    for(x=0;x<W;x++){
      if(!mask[y][x]) continue;
      var edge = (x===0||!mask[y][x-1]) || (x===W-1||!mask[y][x+1]) || (y===0||!mask[y-1][x]) || (y===H-1||!mask[y+1][x]);
      if(edge) ctx.fillRect(x,y,1,1);
    }
  }

  var eyeY=14, off=pal.faceDir*2;
  [[-2,eyeY],[1,eyeY]].forEach(function(p){
    var ex=cx+p[0]+off, ey=p[1];
    ctx.fillStyle="#fff";
    ctx.fillRect(ex-1,ey-1,2,2);
    ctx.fillStyle=ink;
    ctx.fillRect(ex+(pal.faceDir>0?0:-1),ey,1,1);
  });
}

function QuestionPanel(props){

  if(q.type==="F"){

  }

function FillPanel(props){
  var q=props.q;
  var blankCount = q.blanks.length;
  var stateVals = useState(new Array(blankCount).fill(""));
  var vals=stateVals[0], setVals=stateVals[1];
  var stateAnswered = useState(false);
  var answered=stateAnswered[0], setAnswered=stateAnswered[1];
  var stateMarks = useState(new Array(blankCount).fill(""));
  var marks=stateMarks[0], setMarks=stateMarks[1];

  function submit(){
    if(answered) return;
    var newMarks = vals.map(function(v,i){
      var ok = q.blanks[i].some(function(a){return normalize(a)===normalize(v);})
        || q.blanks[i].some(function(a){return fuzzyMatch(v,a);});
      return ok?"correct":"wrong";
    });
    setMarks(newMarks);
    setAnswered(true);
    var allOk = newMarks.every(function(m){return m==="correct";});
    props.onAnswer(allOk, "正确答案："+q.show);
  }

  var parts = q.text.split("⟦⟧");
  var nodes = [];
  parts.forEach(function(part,i){
    nodes.push(part);
    if(i<parts.length-1){
      nodes.push(h("input", {
        key:"b"+i,
        className:"blank-input",
        type:"text",
        autoComplete:"off",
        autoCapitalize:"off",
        spellCheck:false,
        disabled:answered,
        "data-state":marks[i]||undefined,
        style:{width:Math.max(56, q.blanks[i][0].length*13)+"px"},
        value:vals[i],
        onChange:function(e){
          var nv=vals.slice(); nv[i]=e.target.value; setVals(nv);
        },
        onKeyDown:function(e){
          if(e.key==="Enter") submit();
        }
      }));
    }
  });

  return h(React.Fragment, null,
    h("p",{className:"q-text"}, nodes),
    !answered && h("div",{className:"dialog-actions"},
      h("button",{className:"pixel-btn blue", type:"button", onClick:submit}, "提交")
    )
  );
}

function McPanel(props){
  var q=props.q;
  var st = useState(-1);
  var chosen=st[0], setChosen=st[1];
  var answered = chosen>=0;
  function pick(i){
    if(answered) return;
    setChosen(i);
    var ok = i===q.correct;
    props.onAnswer(ok, "正确答案："+String.fromCharCode(65+q.correct)+". "+q.options[q.correct]);
  }
  return h(React.Fragment, null,
    h("p",{className:"q-text"}, q.text),
    h("div",{className:"opt-grid"},
      q.options.map(function(opt,i){
        var mark = answered ? (i===q.correct ? "correct" : (i===chosen ? "wrong" : undefined)) : undefined;
        return h("button",{
          key:i, type:"button", className:"opt-btn", disabled:answered,
          "data-mark":mark,
          onClick:function(){ pick(i); }
        }, h("span",{className:"idx"}, String.fromCharCode(65+i)), h("span",null, opt));
      })
    )
  );
}

function TfPanel(props){
  var q=props.q;
  var st = useState(null);
  var chosen=st[0], setChosen=st[1];
  var answered = chosen!==null;
  function pick(v){
    if(answered) return;
    setChosen(v);
    props.onAnswer(v===q.correct, q.explain);
  }
  return h(React.Fragment, null,
    h("p",{className:"q-text"}, q.text),
    h("div",{className:"tf-row"},
      ["正确","错误"].map(function(label,i){
        var v = i===0;
        var mark = answered ? (v===q.correct ? "correct" : (v===chosen ? "wrong" : undefined)) : undefined;
        return h("button",{
          key:i, type:"button", className:"tf-btn", disabled:answered,
          "data-mark":mark,
          onClick:function(){ pick(v); }
        }, label);
      })
    )
  );
}

/* ---------------- App ---------------- */
function newQueue(){
  var ids = shuffle(DATA.map(function(q){return q.id;})).slice(0, TOTAL_ROUNDS);
  return ids.map(function(id){ return DATA.filter(function(q){return q.id===id;})[0]; });
}

function App(){
  var screenSt = useState("start"); var screen=screenSt[0], setScreen=screenSt[1];
  var queueSt = useState([]); var queue=queueSt[0], setQueue=queueSt[1];
  var idxSt = useState(0); var qIndex=idxSt[0], setQIndex=idxSt[1];
  var correctSt = useState(0); var correctCount=correctSt[0], setCorrectCount=correctSt[1];
  var wrongSt = useState(0); var wrongCount=wrongSt[0], setWrongCount=wrongSt[1];
  var streakSt = useState(0); var streak=streakSt[0], setStreak=streakSt[1];
  var maxStreakSt = useState(0); var maxStreak=maxStreakSt[0], setMaxStreak=maxStreakSt[1];
  var specialSt = useState(0); var special=specialSt[0], setSpecial=specialSt[1];
  var leftHpSt = useState(100); var leftHp=leftHpSt[0], setLeftHp=leftHpSt[1];
  var rightHpSt = useState(100); var rightHp=rightHpSt[0], setRightHp=rightHpSt[1];
  var leftAnimSt = useState(""); var leftAnim=leftAnimSt[0], setLeftAnim=leftAnimSt[1];
  var rightAnimSt = useState(""); var rightAnim=rightAnimSt[0], setRightAnim=rightAnimSt[1];
  var projSt = useState(null); var proj=projSt[0], setProj=projSt[1];
  var popupSt = useState(null); var popup=popupSt[0], setPopup=popupSt[1];
  var feedbackSt = useState(null); var feedback=feedbackSt[0], setFeedback=feedbackSt[1];
  var lockedSt = useState(false); var locked=lockedSt[0], setLocked=lockedSt[1];
  var shakeSt = useState(false); var shake=shakeSt[0], setShake=shakeSt[1];
  var outcomeSt = useState(null); var outcome=outcomeSt[0], setOutcome=outcomeSt[1];
  var mutedSt = useState(false); var muted=mutedSt[0], setMuted=mutedSt[1];
  var showPanelSt = useState(true); var showPanel=showPanelSt[0], setShowPanel=showPanelSt[1];

  var timers = useRef([]);
  function later(fn, ms){ var id=setTimeout(fn,ms); timers.current.push(id); return id; }
  useEffect(function(){
    return function(){ timers.current.forEach(clearTimeout); };
  }, []);
  var pendingRef = useRef(null);

  function play(fn){ if(!muted) fn(); }

  function startGame(){
    getCtx();
    timers.current.forEach(clearTimeout); timers.current=[];
    pendingRef.current = null;
    setQueue(newQueue());
    setQIndex(0); setCorrectCount(0); setWrongCount(0);
    setStreak(0); setMaxStreak(0); setSpecial(0);
    setLeftHp(100); setRightHp(100);
    setLeftAnim(""); setRightAnim(""); setProj(null); setPopup(null);
    setFeedback(null); setLocked(false); setOutcome(null);
    setShowPanel(true);
    setScreen("battle");
  }

  /* 提交答案：先在题板上把正确答案显示 10 秒，之后题板消失、进行攻击动画，再切换下一题 */
  function handleAnswer(correct, message){
    if(locked) return;
    setLocked(true);
    var crit = false;
    var nextStreak = streak;
    var nextSpecial = special;
    if(correct){
      nextStreak = streak+1;
      nextSpecial = Math.min(100, special+20);
      if(nextSpecial>=100){ crit=true; nextSpecial=0; }
      setStreak(nextStreak);
      setMaxStreak(Math.max(maxStreak, nextStreak));
      setSpecial(nextSpecial);
    } else {
      setStreak(0);
    }
    setFeedback(message);
    pendingRef.current = {correct:correct, crit:crit};
    later(runAttack, 10000);
  }

  function runAttack(){
    var p = pendingRef.current;
    if(!p) return;
    pendingRef.current = null;
    var correct = p.correct, crit = p.crit;
    setShowPanel(false);
    setFeedback(null);

    var dmg = correct ? (crit?4:2) : 5;
    var dir = correct ? "toRight" : "toLeft";
    var kind = correct ? "fire" : "ice";
    setProj({dir:dir, kind:kind, seq:Date.now()+Math.random()});
    play(function(){ correct ? (crit?sfxCrit():sfxHit()) : sfxWrong(); });

    later(function(){
      setProj(null);
      if(correct){
        setRightAnim("attack"); setLeftAnim("");
        later(function(){
          setRightHp(function(v){ return Math.max(0, v-dmg); });
          setRightAnim("hurt");
          setShake(true);
          later(function(){ setShake(false); }, 350);
        }, 420);
        later(function(){ setRightAnim(""); }, 900);
      } else {
        setLeftAnim("attack"); setRightAnim("");
        later(function(){
          setLeftHp(function(v){ return Math.max(0, v-dmg); });
          setLeftAnim("hurt");
          setShake(true);
          later(function(){ setShake(false); }, 350);
        }, 420);
        later(function(){ setLeftAnim(""); }, 900);
      }
      setPopup({
        side: correct?"right":"left",
        text: correct ? (crit?"暴击！":"命中！") : "反击！",
        crit: crit,
        seq: Date.now()+Math.random()
      });
      later(function(){ setPopup(null); }, 1000);
    }, 460);

    var newCorrect = correctCount + (correct?1:0);
    var newWrong = wrongCount + (correct?0:1);
    setCorrectCount(newCorrect);
    setWrongCount(newWrong);

    later(function(){ advance(newWrong); }, 1900);
  }

  function advance(newWrong){
    setLeftAnim(""); setRightAnim(""); setShake(false); setProj(null); setPopup(null);
    if(newWrong>=MAX_WRONG){
      finish("lose");
      return;
    }
    if(qIndex+1>=queue.length){
      finish("win");
      return;
    }
    setQIndex(function(v){return v+1;});
    setFeedback(null);
    setLocked(false);
    setShowPanel(true);
  }

  function finish(result){
    setOutcome(result);
    setFeedback(null);
    if(result==="win"){
      later(function(){ play(sfxWin); }, 200);
    } else {
      setLeftAnim("faint");
      later(function(){ play(sfxLose); }, 200);
    }
    later(function(){ setScreen("result"); }, result==="lose" ? 700 : 100);
  }

  function skipToNext(){
    if(feedback==null) return;
    timers.current.forEach(clearTimeout); timers.current=[];
    runAttack();
  }

  var current = queue[qIndex];

  return h("div", null,
    screen==="start" && h(StartScreen, {onStart:startGame}),
    screen==="battle" && current && h("div", null,
      h("div", {style:{display:"flex", justifyContent:"flex-end", marginBottom:"8px"}},
        h("button", {
          className:"pixel-btn ghost", type:"button", style:{fontSize:"9px", padding:"8px 12px"},
          onClick:function(){ setMuted(!muted); }
        }, muted ? "音效：关" : "音效：开")
      ),
      h("div", {className:"pixel-panel arena-frame"+(shake?" shake":"")},
        h("div",{className:"sky"}),
        h("div",{className:"hill hill-back"}),
        h("div",{className:"hill hill-front"}),
        h("div",{className:"ground"}),
        h("div",{className:"hud-top"},
          h("div",{className:"fighter-card left"},
            h("div",{className:"fighter-name"}, h("span",{className:"side-tag"},"RED"), h("span",null,"炎焰兽")),
            h("div",{className:"hp-track"}, h("div",{className:"hp-fill", style:{width:leftHp+"%", background:hpColor(leftHp)}})),
            h("div",{className:"hp-num"}, "HP "+leftHp+"%"),
            h("div",{className:"special-track"}, h("div",{className:"special-fill", style:{width:special+"%"}}))
          ),
          h("div",{className:"fighter-card right"},
            h("div",{className:"fighter-name"}, h("span",{className:"side-tag"},"BLUE"), h("span",null,"寒冰兽")),
            h("div",{className:"hp-track"}, h("div",{className:"hp-fill", style:{width:rightHp+"%", background:hpColor(rightHp)}})),
            h("div",{className:"hp-num"}, "HP "+rightHp+"%")
          )
        ),
        h("div",{className:"vs-badge"}, h("span",null,"Q"), h("span",null,(qIndex+1)+"/"+TOTAL_ROUNDS)),
        h(Fighter, {side:"left", kind:"ember", anim:leftAnim}),
        h(Fighter, {side:"right", kind:"frost", anim:rightAnim}),
        proj && h("div", {key:proj.seq, className:"projectile "+proj.kind+" "+proj.dir}),
        popup && h("div", {
          key:popup.seq,
          className:"popup-text "+popup.side+(popup.crit?" crit":" hit")
        }, popup.text),
        showPanel && h("div", {key:current.id, className:"pixel-panel dialog-box"},
          h(MetaRow, {q:current, round:qIndex+1}),
          h(QuestionPanel, {key:current.id, q:current, onAnswer:handleAnswer}),
          h("div", {className:"feedback-line"+(feedback?" show":"")},
            feedback,
            feedback && h("div",{style:{marginTop:"10px", textAlign:"right"}},
              h("button",{className:"pixel-btn ghost", type:"button", onClick:skipToNext}, "跳过等待 ▶")
            )
          ),
          h("p",{style:{fontFamily:"var(--font-pixel)", fontSize:"9px", marginTop:"14px", color: wrongCount>=15?"var(--red-dark)":"#6b6b52"}},
            "危险度 " + wrongCount + " / " + MAX_WRONG + "　连击 x" + streak
          )
        )
      )
    ),
    screen==="result" && h(ResultScreen, {
      outcome:outcome, correctCount:correctCount, wrongCount:wrongCount,
      maxStreak:maxStreak, total:queue.length, onRetry:startGame
    })
  );
}

function StartScreen(props){
  return h("div", {className:"pixel-panel start-panel"},
    h("h1", null, "化学对战", h("br"), "PIXEL QUIZ ARENA"),
    h("div", {className:"start-rules"},
      "· 涵盖全部 72 个知识点，顺序随机打乱组成本场对战", h("br"),
      "· 答对一题 → ", h("b",null,"炎焰兽"), " 攻击对方一次", h("br"),
      "· 答错一题 → ", h("b",null,"寒冰兽"), " 反击你一次", h("br"),
      "· 连续答对可蓄满必杀槽，触发", h("b",null,"暴击"), h("br"),
      "· 累计答错满 ", h("b",null,"29"), " 题（答错率达40%），本场战斗失败"
    ),
    h("button", {className:"pixel-btn", type:"button", onClick:props.onStart}, "开始对战 ▶")
  );
}

function ResultScreen(props){
  var win = props.outcome==="win";
  return h("div", {className:"pixel-panel result-panel result-frame"},
    win && h(Confetti, null),
    h("div", {className:"result-title "+(win?"win":"lose")}, win ? "VICTORY!" : "DEFEATED"),
    h("p", {style:{fontSize:"14px", color:"#4a4a38"}},
      win ? "你顶住了寒冰兽 50 回合的猛攻，战斗胜利！" : "答错题目过多，寒冰兽的反击太猛烈了……"
    ),
    h("div", {className:"result-stats"},
      h("div", null, h("b",null,props.correctCount), h("span",null,"答对")),
      h("div", null, h("b",null,props.wrongCount), h("span",null,"答错")),
      h("div", null, h("b",null,props.maxStreak), h("span",null,"最高连击")),
      h("div", null, h("b",null,props.correctCount+"/"+props.total), h("span",null,"完成进度"))
    ),
    h("button", {className:"pixel-btn blue", type:"button", onClick:props.onRetry}, "再战一次")
  );
}

var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(h(App));
})();

</script>
